<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>纱纱的日程</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
--bg:#edf0f4;--card:#f7f9fb;--text:#4a5568;--sub:#7b8fa1;
--border:#dce3ea;--hover:#e5ebf1;--today:#c5d5e4;--accent:#7b9ab8;
--accent2:#5a7d9a;--done:#bcc7d4;--pending:#b08080;
--work:#7b8fa1;--life:#a09098;--study:#8fa89f;--health:#9b8faa;
--craft:#b8a590;--park:#7ea89b;--exhibit:#a8889b;--read:#a89880}
html,body{width:100%;min-height:100%;background:var(--bg);color:var(--text);font-family:"PingFang SC","Helvetica Neue",sans-serif;-webkit-text-size-adjust:100%}
body{padding:0 0 60px}
.page{max-width:520px;margin:0 auto;padding:14px 12px}
.hd-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 6px;max-width:520px;margin:0 auto}
.hd-title{font-size:18px;font-weight:700;letter-spacing:.5px;color:var(--text)}
.hd-sync{font-size:10px;padding:4px 10px;border-radius:10px;background:var(--card);color:var(--sub);box-shadow:0 1px 3px rgba(0,0,0,.06);cursor:pointer}
.ss-ok{color:#7ea89b}.ss-er{color:var(--pending)}.ss-sy{color:var(--sub)}
.st{font-size:16px;font-weight:700;margin:14px 0 8px;letter-spacing:.5px;color:var(--text);display:flex;align-items:center;gap:6px}
.st::before{content:"";width:3px;height:14px;background:var(--accent);border-radius:2px;display:inline-block}
.card{background:var(--card);border-radius:12px;padding:12px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.card-hd .dl{font-size:14px;font-weight:600;color:var(--text)}
.btn{border:1px solid var(--border);background:var(--card);color:var(--sub);font-size:10px;padding:3px 10px;border-radius:10px;cursor:pointer}
.btn:active{background:var(--hover)}
.btn.ac{background:var(--accent);color:#fff;border-color:var(--accent)}
/* Calendar */
.cal-nav{display:flex;align-items:center;gap:8px}
.cal-nav button{background:none;border:none;color:var(--sub);font-size:18px;padding:2px 8px;border-radius:6px;cursor:pointer;line-height:1}
.cal-nav button:active{background:var(--hover)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center}
.cal-grid .dn{font-size:11px;color:var(--sub);padding:4px 0;font-weight:500}
.cal-grid .dn.we{color:#9b8faa}
.cal-grid .dc{font-size:13px;padding:6px 0;cursor:pointer;border-radius:8px;position:relative;color:var(--text);font-weight:500}
.cal-grid .dc:active{background:var(--hover)}
.cal-grid .dc.td{background:var(--today);font-weight:700}
.cal-grid .dc.sel{background:var(--accent);color:#fff}
.cal-grid .dc.hd{color:#a8889b}
.cal-grid .dc.we{color:#9b8faa}
.cal-grid .dc.om{color:#cdd5de;pointer-events:none}
.cal-grid .dc .dp{width:5px;height:5px;border-radius:50%;background:var(--accent2);position:absolute;bottom:1px;left:50%;transform:translateX(-50%)}
.cal-grid .dc .dp.pd{background:var(--pending)}
.cal-grid .dc.sel .dp,.cal-grid .dc.td .dp{background:#fff}
/* Todo */
.todo-stats{font-size:10px;color:var(--sub);margin-bottom:6px;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.todo-stats .chip{font-size:10px;padding:2px 7px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--sub);cursor:pointer}
.todo-stats .chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.todo-list{list-style:none}
.ti{padding:6px 4px;border-radius:6px;margin-bottom:3px;border-left:3px solid transparent;display:flex;align-items:center;gap:6px}
.ti:active{background:var(--hover)}
.ti .ck{width:17px;height:17px;border-radius:50%;border:1.5px solid var(--border);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent}
.ti.chk .ck{background:var(--accent);border-color:var(--accent);color:#fff}
.ti .ctg{font-size:9px;padding:2px 6px;border-radius:6px;color:#fff;white-space:nowrap;flex-shrink:0;font-weight:500}
.ti .ttl{font-size:13px;font-weight:500;flex:1;cursor:pointer;line-height:1.3;word-break:break-all}
.ti.done .ttl{color:var(--done);text-decoration:line-through}
.ti .tgl{color:var(--sub);font-size:10px;flex-shrink:0;cursor:pointer;padding:0 4px}
.ti-dr{display:none;font-size:11px;color:var(--sub);padding:2px 0 6px 28px;line-height:1.6;white-space:pre-wrap}
.ti.exp+.ti-dr{display:block}
.te{text-align:center;color:var(--sub);font-size:12px;padding:14px 0}
.add-td{display:flex;gap:6px;margin-top:8px;align-items:center}
.add-td input{flex:1;border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:13px;outline:none;background:#fff;color:var(--text);min-width:0}
.add-td input:focus{border-color:var(--accent)}
.add-td select{border:1px solid var(--border);border-radius:8px;padding:7px 6px;font-size:11px;background:#fff;color:var(--text);outline:none;max-width:85px}
.add-td .ab{border:none;background:var(--accent);color:#fff;border-radius:8px;padding:7px 12px;font-size:14px;cursor:pointer;flex-shrink:0;font-weight:700}
.add-td .ab:active{background:var(--accent2)}
/* Health & Checkin */
.ck-table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
.ck-table th{padding:6px 2px;background:var(--hover);text-align:center;font-weight:600;color:var(--sub);font-size:10px;border-radius:4px}
.ck-table td{padding:5px 2px;text-align:center;border-bottom:1px solid #eef1f5;font-size:11px}
.ck-table td:first-child{font-weight:500;font-size:10px;color:var(--text)}
.ck-table input[type="time"]{width:100%;border:1px solid var(--border);border-radius:4px;padding:3px 2px;font-size:11px;font-family:inherit;background:#fff;text-align:center}
.ck-table input[type="number"]{width:100%;border:1px solid var(--border);border-radius:4px;padding:3px 2px;font-size:11px;font-family:inherit;background:#fff;text-align:center}
.ck-table input[readonly]{background:transparent;border-color:transparent;color:var(--text);font-weight:500}
.ck-dot{cursor:pointer;font-size:18px;user-select:none;line-height:1;display:inline-block}
.ck-dot.on{color:var(--accent)}
.ck-dot.off{color:#d5dde5}
/* Week */
.week-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -12px;padding:0 12px}
.week-wrap::-webkit-scrollbar{height:3px}
.week-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.lwg{display:grid;grid-template-columns:32px repeat(7,minmax(80px,1fr));gap:2px;font-size:11px;min-width:480px}
.lwgh{padding:6px 2px;text-align:center;font-weight:600;color:var(--sub);border-bottom:1px solid var(--border);font-size:10px;background:var(--hover);border-radius:4px 4px 0 0}
.lwgn{text-align:center;padding:6px 2px;color:var(--sub);font-size:10px;border-right:1px solid var(--border);font-weight:500}
.lwgc{padding:3px;min-height:38px;border-bottom:1px solid #eef1f5;vertical-align:top}
.lwgc .levt{font-size:10px;padding:3px 4px;border-radius:3px;margin-bottom:2px;white-space:normal;overflow:visible;line-height:1.5}
.wfb{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.wfbi{font-size:11px;padding:4px 9px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--sub);cursor:pointer}
.wfbi:active{background:var(--hover)}
.wfbi.ac{background:var(--accent);color:#fff;border-color:var(--accent)}
.week-orient{display:none;background:var(--card);border-radius:10px;padding:14px;text-align:center;color:var(--sub);font-size:13px;line-height:1.8;margin-bottom:8px}
.week-orient b{color:var(--accent)}
/* Memo */
.mta{width:100%;border:1px solid var(--border);border-radius:10px;padding:12px;font-size:14px;font-family:inherit;background:#fff;color:var(--text);resize:vertical;outline:none;line-height:1.7;min-height:180px}
.mta:focus{border-color:var(--accent)}
.mact{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
.ms{font-size:10px;color:var(--sub)}
.mact-btns{display:flex;gap:8px}
.mact-btns button{font-size:12px;padding:6px 16px;border-radius:8px;border:none;cursor:pointer;font-weight:500}
.mb-save{background:var(--accent);color:#fff}
.mb-save:active{background:var(--accent2)}
.mb-clear{background:var(--hover);color:var(--sub)}
.mb-clear:active{background:var(--border)}
/* Token modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-bg.sh{display:flex}
.modal{background:var(--card);border-radius:14px;padding:20px;width:100%;max-width:340px;box-shadow:0 10px 40px rgba(0,0,0,.15)}
.modal h3{font-size:15px;margin-bottom:8px;color:var(--text)}
.modal p{font-size:12px;color:var(--sub);line-height:1.6;margin-bottom:12px}
.modal input{width:100%;border:1px solid var(--border);border-radius:8px;padding:10px;font-size:13px;outline:none;background:#fff;margin-bottom:12px}
.modal input:focus{border-color:var(--accent)}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.modal-btns button{font-size:12px;padding:7px 16px;border-radius:8px;border:none;cursor:pointer}
.mb-ok{background:var(--accent);color:#fff}
.mb-cancel{background:var(--hover);color:var(--sub)}
</style>
</head>
<body>
<div class="hd-bar">
<div class="hd-title">纱纱的日程</div>
<div class="hd-sync ss-ok" id="syncStatus" onclick="showTokenModal()">已同步</div>
</div>
<div class="page">
<!-- Calendar -->
<div class="st">日历</div>
<div class="card">
<div class="card-hd">
<div class="dl" id="calTitle"></div>
<div class="cal-nav">
<button onclick="chgM(-1)">&#9664;</button>
<button class="btn" onclick="goT()">今天</button>
<button onclick="chgM(1)">&#9654;</button>
</div>
</div>
<div class="cal-grid" id="calGrid"></div>
</div>
<!-- Today's Todos -->
<div class="st">今日待办</div>
<div class="card">
<div class="card-hd">
<div class="dl" id="tdDL"></div>
<button class="btn" id="eaBtn" onclick="togA()">展开</button>
</div>
<div class="todo-stats" id="tdStats"></div>
<div class="todo-list" id="tdList"></div>
<div class="add-td">
<input type="text" id="tdInp" placeholder="输入待办,按 Enter 添加" onkeydown="if(event.key==='Enter')addTD()">
<select id="tdCat"></select>
<button class="ab" onclick="addTD()">+</button>
</div>
</div>
<!-- Health -->
<div class="st">健康管理</div>
<div class="card">
<div class="card-hd">
<div class="dl">睡眠与体重</div>
<button class="btn" id="hTog" onclick="togH()">展开整月 &#9662;</button>
</div>
<div id="hCtx"></div>
</div>
<!-- Checkin -->
<div class="st">月打卡</div>
<div class="card">
<div class="card-hd">
<div class="dl">习惯打卡</div>
<button class="btn" id="ckTog" onclick="togC()">展开整月 &#9662;</button>
</div>
<div id="ckCtx"></div>
</div>
<!-- Week -->
<div class="st">一周日程</div>
<div class="card">
<div class="wfb" id="wfb"></div>
<div class="week-wrap"><div class="lwg" id="lwg"></div></div>
</div>
<!-- Memo -->
<div class="st">备忘录</div>
<div class="card">
<textarea class="mta" id="memoTA" placeholder="在这里记录备忘..." oninput="autoSaveMemo()"></textarea>
<div class="mact">
<div class="ms" id="memoStatus"></div>
<div class="mact-btns">
<button class="mb-clear" onclick="clearMemo()">清空</button>
<button class="mb-save" onclick="saveMemo()">保存</button>
</div>
</div>
</div>
</div>
<!-- Token Modal -->
<div class="modal-bg" id="tokenModal">
<div class="modal">
<h3>设置 GitHub Token</h3>
<p>首次使用需要填写 GitHub Personal Access Token（用于跨设备同步数据）。Token 仅保存在本设备浏览器中，不会泄露。</p>
<input type="password" id="tokenInp" placeholder="ghp_xxxxxxxxxxxx">
<div class="modal-btns">
<button class="mb-cancel" onclick="closeTokenModal()">稍后</button>
<button class="mb-ok" onclick="saveToken()">保存</button>
</div>
</div>
</div>
<script>
// ===== GitHub 云同步 =====
const GITHUB_OWNER = 'SallyLulu';
const GITHUB_REPO = 'sasha-schedule';
const DATA_FILE = 'data.json';
let _cloudVersion = 0, _syncTimer = null;

function getGitHubToken() {
  return localStorage.getItem('sasha_github_token') || '';
}
function setGitHubToken(t) {
  localStorage.setItem('sasha_github_token', t);
}
function showTokenModal() {
  document.getElementById('tokenInp').value = getGitHubToken();
  document.getElementById('tokenModal').className = 'modal-bg sh';
}
function closeTokenModal() {
  document.getElementById('tokenModal').className = 'modal-bg';
}
function saveToken() {
  var t = document.getElementById('tokenInp').value.trim();
  if (t) setGitHubToken(t);
  closeTokenModal();
  doSyncNow();
}
function showSync(st, msg) {
  var el = document.getElementById('syncStatus');
  if (st === 'ok') { el.textContent = msg || '已同步'; el.className = 'hd-sync ss-ok'; }
  else if (st === 'er') { el.textContent = msg || '同步失败'; el.className = 'hd-sync ss-er'; }
  else { el.textContent = msg || '同步中...'; el.className = 'hd-sync ss-sy'; }
}
async function loadFromGitHub() {
  var t = getGitHubToken();
  if (!t) return null;
  var url = 'https://api.github.com/repos/' + GITHUB_OWNER + '/' + GITHUB_REPO + '/contents/' + DATA_FILE;
  try {
    var r = await fetch(url, { headers: { 'Authorization': 'token ' + t } });
    if (r.status === 404) return null;
    if (!r.ok) throw Error('');
    var info = await r.json();
    return JSON.parse(decodeURIComponent(escape(atob(info.content.replace(/\s/g, '')))));
  } catch(e) { return null; }
}
function schedSync(cd) {
  if (_syncTimer) clearTimeout(_syncTimer);
  _syncTimer = setTimeout(function() { doSyncNow(cd); }, 2000);
}
async function doSyncNow(cd) {
  cd = cd || getCD();
  var t = getGitHubToken();
  if (!t) { showSync('er', '点击设置 Token'); return; }
  showSync('sy', '同步中...');
  var url = 'https://api.github.com/repos/' + GITHUB_OWNER + '/' + GITHUB_REPO + '/contents/' + DATA_FILE;
  try {
    var sha = null;
    var gr = await fetch(url, { headers: { 'Authorization': 'token ' + t } });
    if (gr.ok) { var gi = await gr.json(); sha = gi.sha; }
    var jsonStr = JSON.stringify(cd, null, 2);
    var content = btoa(unescape(encodeURIComponent(jsonStr)));
    var pr = await fetch(url, {
      method: 'PUT', headers: { 'Authorization': 'token ' + t, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: 'Sync schedule data', content: content, sha: sha, branch: 'main' })
    });
    if (pr.ok) { showSync('ok', '已同步'); _cloudVersion = cd.version || 0; }
    else showSync('er', '同步失败');
  } catch(e) { showSync('er', '网络错误'); }
}

// ===== 数据管理 =====
function getCD() {
  var d = null; try { d = JSON.parse(localStorage.getItem('sasha_cloud')); } catch(e) {}
  if (!d || typeof d !== 'object') d = { schedule: {}, checkin: {}, memo: '', version: 1 };
  return d;
}
function putCD(d) {
  if (!d.version) d.version = 1;
  d.version++;
  localStorage.setItem('sasha_cloud', JSON.stringify(d));
  schedSync(d);
}
function ldSch() { return getCD().schedule || {}; }
function svSch(d) { var c = getCD(); c.schedule = d; putCD(c); }
function ldCk() { return getCD().checkin || {}; }
function svCk(d) { var c = getCD(); c.checkin = d; putCD(c); }

const CATS = ['工作','展览','手工','阅读','学习','生活','公园','健康'];
const CC = {'工作':'#7b8fa1','展览':'#a8889b','手工':'#b8a590','阅读':'#a89880','学习':'#8fa89f','生活':'#a09098','公园':'#7ea89b','健康':'#9b8faa'};
const DAYS = ['一','二','三','四','五','六','日'];
const HOLIDAYS_2026 = {'2026-01-01':'元旦','2026-01-02':'元旦','2026-02-17':'除夕','2026-02-18':'春节','2026-02-19':'春节','2026-02-20':'春节','2026-02-21':'春节','2026-02-22':'春节','2026-02-23':'春节','2026-04-05':'清明','2026-05-01':'劳动节','2026-05-02':'劳动节','2026-05-03':'劳动节','2026-06-19':'端午节','2026-09-25':'中秋节','2026-10-01':'国庆节','2026-10-02':'国庆节','2026-10-03':'国庆节','2026-10-04':'国庆节','2026-10-05':'国庆节','2026-10-06':'国庆节','2026-10-07':'国庆节'};

let curY = 2026, curM = 7, selD = '';
let showAll = false, activeF = '全部', wkStart = null;
let hExp = false, cExp = false;
let tdFilter = '全部';

function fmtD(y,m,d) { return y+'-'+(m<10?'0':'')+m+'-'+(d<10?'0':'')+d; }
function getMon(d) { var dt = new Date(d); var day = dt.getDay()||7; dt.setDate(dt.getDate()-day+1); return dt; }
function addD(d,n) { var r = new Date(d); r.setDate(r.getDate()+n); return r; }
function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function getDayL(ds) { var d = new Date(ds); return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()]; }
function getDayLzh(ds) { var d = new Date(ds); return '周'+['日','一','二','三','四','五','六'][d.getDay()]; }
function getTStr() { var n = new Date(); return fmtD(n.getFullYear(), n.getMonth()+1, n.getDate()); }
function getDS(d,off) { var dt = new Date(d); dt.setDate(dt.getDate()+off); return fmtD(dt.getFullYear(), dt.getMonth()+1, dt.getDate()); }

// ===== Calendar =====
function renderCal() {
  document.getElementById('calTitle').textContent = curY + '年' + curM + '月';
  var grid = document.getElementById('calGrid');
  var fd = new Date(curY, curM-1, 1), ld = new Date(curY, curM, 0);
  var sd = fd.getDay() || 7, td = ld.getDate(), pl = new Date(curY, curM-1, 0).getDate();
  var h = '';
  for (var i = 0; i < 7; i++) h += '<div class="dn' + (i >= 5 ? ' we' : '') + '">周' + DAYS[i] + '</div>';
  var data = ldSch();
  for (var i = sd - 1; i > 0; i--) h += '<div class="dc om">' + (pl - i + 1) + '</div>';
  for (var d = 1; d <= td; d++) {
    var ds = fmtD(curY, curM, d);
    var isT = ds === getTStr(), isS = ds === selD;
    var dt = new Date(curY, curM-1, d);
    var dow = dt.getDay() || 7;
    var tos = data[ds] || [];
    var hasT = tos.length > 0, allD = hasT && tos.every(function(t) { return t.done; });
    var cls = 'dc';
    if (isT) cls += ' td';
    if (isS) cls += ' sel';
    else if (HOLIDAYS_2026[ds]) cls += ' hd';
    else if (dow >= 6) cls += ' we';
    h += '<div class="' + cls + '" onclick="selDay(\'' + ds + '\')">' + d;
    if (hasT) h += '<span class="dp' + (allD ? '' : ' pd') + '"></span>';
    h += '</div>';
  }
  var rem = 7 - ((sd - 1 + td) % 7);
  if (rem < 7) for (var d = 1; d <= rem; d++) h += '<div class="dc om">' + d + '</div>';
  grid.innerHTML = h;
}
function selDay(ds) {
  selD = ds;
  var p = ds.split('-');
  curY = parseInt(p[0]); curM = parseInt(p[1]);
  showAll = false;
  updWR(); renderWk();
  renderCal(); renderTD();
}
function chgM(d) {
  curM += d;
  if (curM < 1) { curM = 12; curY--; }
  if (curM > 12) { curM = 1; curY++; }
  renderCal();
}
function goT() {
  var n = new Date();
  curY = n.getFullYear(); curM = n.getMonth() + 1;
  selD = getTStr(); showAll = false;
  updWR(); renderWk();
  renderCal(); renderTD();
}

// ===== Todo =====
function togA() {
  showAll = !showAll;
  document.getElementById('eaBtn').textContent = showAll ? '收起 ▲' : '展开';
  renderTD();
}
function setTdFilter(c) {
  tdFilter = c;
  renderTD();
}
function renderTD() {
  var data = ldSch(), tos = data[selD] || [];
  document.getElementById('tdDL').textContent = selD + ' ' + getDayLzh(selD);
  document.getElementById('eaBtn').textContent = showAll ? '收起 ▲' : '展开';
  // Stats & filter chips
  var stats = document.getElementById('tdStats');
  var doneN = tos.filter(function(t){return t.done;}).length;
  var sH = '<span style="margin-right:4px">已完成 ' + doneN + '/' + tos.length + ' 项</span>';
  sH += '<span class="chip' + (tdFilter==='全部'?' on':'') + '" onclick="setTdFilter(\'全部\')">全部</span>';
  CATS.forEach(function(c){
    var has = tos.some(function(t){return t.category===c;});
    sH += '<span class="chip' + (tdFilter===c?' on':'') + '" onclick="setTdFilter(\''+c+'\')">' + c + (has?'':' ·') + '</span>';
  });
  stats.innerHTML = sH;
  // List
  var list = document.getElementById('tdList');
  var vis = tos.filter(function(t){
    if (t.done && !showAll) return false;
    if (tdFilter !== '全部' && t.category !== tdFilter) return false;
    return true;
  });
  if (vis.length === 0) { list.innerHTML = '<div class="te">暂无待办事项</div>'; return; }
  var h = '';
  for (var i = 0; i < tos.length; i++) {
    var t = tos[i];
    if (t.done && !showAll) continue;
    if (tdFilter !== '全部' && t.category !== tdFilter) continue;
    var cc = CC[t.category] || '#7b9ab8';
    h += '<div class="ti' + (t.done ? ' chk' : '') + (t.expanded ? ' exp' : '') + '">';
    h += '<div class="ck" onclick="togTD(' + i + ')">' + (t.done ? '✓' : '') + '</div>';
    h += '<span class="ctg" style="background:' + cc + '">' + t.category + '</span>';
    h += '<span class="ttl" onclick="edTtl(' + i + ',this)">' + esc(t.title) + '</span>';
    h += '<span class="tgl" onclick="togExp(' + i + ')">' + (t.expanded ? '▲' : '▶') + '</span>';
    h += '</div><div class="ti-dr" onclick="edDet(' + i + ',this)">' + (t.detail ? esc(t.detail) : '<span style="color:#cdd5de">点击添加详情</span>') + '</div>';
  }
  list.innerHTML = h || '<div class="te">暂无待办事项</div>';
}
function togTD(i) {
  var data = ldSch();
  if (data[selD] && data[selD][i]) data[selD][i].done = !data[selD][i].done;
  svSch(data); renderTD(); renderCal(); renderWk();
}
function togExp(i) {
  var data = ldSch();
  if (data[selD] && data[selD][i]) data[selD][i].expanded = !data[selD][i].expanded;
  svSch(data); renderTD();
}
function addTD() {
  var inp = document.getElementById('tdInp');
  var cat = document.getElementById('tdCat').value;
  var title = inp.value.trim(); if (!title) return;
  var data = ldSch();
  if (!data[selD]) data[selD] = [];
  data[selD].push({title:title, category:cat, done:false, expanded:false, detail:''});
  svSch(data); inp.value = ''; renderTD(); renderCal(); renderWk();
}
function edTtl(i, el) {
  var old = el.textContent;
  var inp = document.createElement('input');
  inp.type = 'text'; inp.value = old;
  inp.style.cssText = 'width:100%;border:1px solid var(--accent);border-radius:4px;padding:3px 5px;font-size:13px;background:#fff;color:var(--text);outline:none;font-family:inherit';
  el.parentNode.replaceChild(inp, el);
  inp.focus(); inp.select();
  function save() {
    var v = inp.value.trim();
    var data = ldSch();
    if (data[selD] && data[selD][i]) data[selD][i].title = v || old;
    svSch(data); renderTD();
  }
  inp.onkeydown = function(e) {
    if (e.key === 'Enter') { e.preventDefault(); save(); }
  };
  inp.onblur = save;
}
function edDet(i, el) {
  var old = el.textContent.trim();
  var ta = document.createElement('textarea');
  ta.value = old === '点击添加详情' ? '' : old;
  ta.style.cssText = 'width:100%;font-size:12px;color:var(--sub);border:1px solid var(--accent);border-radius:4px;padding:4px 6px;background:#fff;font-family:inherit;outline:none;resize:vertical;line-height:1.4;min-height:50px';
  el.parentNode.replaceChild(ta, el);
  ta.focus();
  function save() {
    var v = ta.value.trim();
    var data = ldSch();
    if (data[selD] && data[selD][i]) data[selD][i].detail = v;
    svSch(data); renderTD();
  }
  ta.onkeydown = function(e) {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); save(); }
  };
  ta.onblur = save;
}

// ===== Week / Health / Checkin helpers =====
function updWR() {
  var m = getMon(new Date(selD || getTStr()));
  wkStart = m;
}
function getMD(y,m) {
  var days = [], ld = new Date(y,m,0).getDate();
  for(var d=1; d<=ld; d++) days.push(fmtD(y,m,d));
  return days;
}
function getCWD() {
  var m = getMon(new Date(selD || getTStr())), days = [];
  for(var i=0;i<7;i++){var d=addD(m,i);days.push(fmtD(d.getFullYear(),d.getMonth()+1,d.getDate()));}
  return days;
}
function togH(){hExp=!hExp;document.getElementById('hTog').textContent=hExp?'收起 ▲':'展开整月 ▽';renH();}
function togC(){cExp=!cExp;document.getElementById('ckTog').textContent=cExp?'收起 ▲':'展开整月 ▽';renC();}

function calDur(s,w){
  if(!s||!w)return'';
  var sp=s.split(':'),wp=w.split(':');
  var sm=parseInt(sp[0])*60+parseInt(sp[1]);
  var wm=parseInt(wp[0])*60+parseInt(wp[1]);
  if(wm<=sm)wm+=24*60;
  return((wm-sm)/60).toFixed(1);
}
function renH(){
  var ck=ldCk(),days=hExp?getMD(curY,curM):getCWD();
  var h='<table class="ck-table"><thead><tr><th style="width:60px">日期</th><th>入睡</th><th>起床</th><th>时长</th><th>体重</th></tr></thead><tbody>';
  days.forEach(function(ds){
    var en=ck[ds]||{},dd=ds.split('-')[2],mm=ds.split('-')[1];
    var dur=calDur(en.sleep,en.wake);
    h+='<tr><td>'+mm+'/'+dd+'</td>'+
      '<td><input type="time" value="'+(en.sleep||'')+'" onchange="updCK(\''+ds+'\',\'sleep\',this.value)"></td>'+
      '<td><input type="time" value="'+(en.wake||'')+'" onchange="updCK(\''+ds+'\',\'wake\',this.value)"></td>'+
      '<td><input type="number" value="'+dur+'" readonly step="0.5"></td>'+
      '<td><input type="number" value="'+(en.weight||'')+'" step="0.1" placeholder="kg" onchange="updCK(\''+ds+'\',\'weight\',this.value)"></td></tr>';
  });
  h+='</tbody></table>';
  document.getElementById('hCtx').innerHTML=h;
}
function renC(){
  var ck=ldCk(),days=cExp?getMD(curY,curM):getCWD();
  var h='<table class="ck-table"><thead><tr><th style="width:60px">日期</th><th>运动</th><th>阅读</th><th>画画</th><th>手工</th></tr></thead><tbody>';
  days.forEach(function(ds){
    var en=ck[ds]||{},dd=ds.split('-')[2],mm=ds.split('-')[1];
    h+='<tr><td>'+mm+'/'+dd+'</td>'+
      '<td><span class="ck-dot '+(en.exercise?'on':'off')+'" onclick="togCK(\''+ds+'\',\'exercise\')">●</span></td>'+
      '<td><span class="ck-dot '+(en.reading?'on':'off')+'" onclick="togCK(\''+ds+'\',\'reading\')">●</span></td>'+
      '<td><span class="ck-dot '+(en.drawing?'on':'off')+'" onclick="togCK(\''+ds+'\',\'drawing\')">●</span></td>'+
      '<td><span class="ck-dot '+(en.craft?'on':'off')+'" onclick="togCK(\''+ds+'\',\'craft\')">●</span></td></tr>';
  });
  h+='</tbody></table>';
  document.getElementById('ckCtx').innerHTML=h;
}
function updCK(ds,fld,val){
  var ck=ldCk();
  if(!ck[ds])ck[ds]={};
  if(fld==='weight')ck[ds][fld]=parseFloat(val)||0;
  else ck[ds][fld]=val;
  if(fld==='sleep'||fld==='wake'){
    var dur=calDur(ck[ds].sleep,ck[ds].wake);
    ck[ds].duration=dur?parseFloat(dur):0;
  }
  svCk(ck);
  if(fld==='sleep'||fld==='wake')renH();
}
function togCK(ds,fld){
  var ck=ldCk();
  if(!ck[ds])ck[ds]={};
  ck[ds][fld]=!ck[ds][fld];
  svCk(ck);renC();
}

// ===== Memo =====
let _memoSaveTimer = null;
function renderMemo() {
  var cd = getCD();
  document.getElementById('memoTA').value = cd.memo || '';
  updateMemoStatus();
}
function autoSaveMemo() {
  if (_memoSaveTimer) clearTimeout(_memoSaveTimer);
  _memoSaveTimer = setTimeout(function() { saveMemo(); }, 800);
}
function saveMemo() {
  if (_memoSaveTimer) clearTimeout(_memoSaveTimer);
  var cd = getCD();
  cd.memo = document.getElementById('memoTA').value;
  putCD(cd);
  var el = document.getElementById('memoStatus');
  el.textContent = '已保存 · ' + new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
}
function clearMemo() {
  if (!confirm('确定清空备忘录内容？')) return;
  var cd = getCD();
  cd.memo = '';
  putCD(cd);
  document.getElementById('memoTA').value = '';
  updateMemoStatus();
}
function updateMemoStatus() {
  var el = document.getElementById('memoStatus');
  var v = document.getElementById('memoTA').value;
  el.textContent = v ? v.length + ' 字' : '';
}

// ===== Week =====
function renF() {
  var bar = document.getElementById('wfb');
  var h = '<button class="wfbi' + (activeF==='全部'?' ac':'') + '" onclick="setF(\'全部\')">全部</button>';
  CATS.forEach(function(c){
    h += '<button class="wfbi' + (activeF===c?' ac':'') + '" onclick="setF(\''+c+'\')">'+c+'</button>';
  });
  bar.innerHTML = h;
}
function setF(cat){activeF=cat;renF();renderWk();}
function renderWk() {
  if(!wkStart)updWR();
  var m = wkStart, data = ldSch();
  var grid = document.getElementById('lwg');
  var dateItems = {};
  for(var i=0;i<7;i++){
    var ds = getDS(m,i);
    dateItems[ds] = (data[ds]||[]).map(function(t,j){return {date:ds,idx:j,title:t.title,category:t.category,done:t.done};});
  }
  var seqNum=1, allItems=[];
  for(var i=0;i<7;i++){
    var ds = fmtD(m.getFullYear(),m.getMonth()+1,m.getDate()+i);
    (dateItems[ds]||[]).forEach(function(it){it.num=seqNum++;allItems.push(it);});
  }
  var h='<div class="lwgh" style="border-right:1px solid var(--border)">#</div>';
  for(var i=0;i<7;i++){
    var dd = new Date(m.getFullYear(),m.getMonth(),m.getDate()+i);
    h+='<div class="lwgh">周'+DAYS[i]+'<br><span style="font-size:9px;font-weight:400">'+(dd.getMonth()+1)+'/'+dd.getDate()+'</span></div>';
  }
  var maxItems=0;
  for(var i=0;i<7;i++){var ds=getDS(m,i);maxItems=Math.max(maxItems,(dateItems[ds]||[]).length);}
  if(maxItems===0)maxItems=1;
  var minRows=6,totalRows=Math.max(maxItems,minRows);
  for(var row=0;row<totalRows;row++){
    h+='<div class="lwgn">'+(row+1)+'</div>';
    for(var col=0;col<7;col++){
      var ds=getDS(m,col);
      var items=dateItems[ds]||[];
      var it=items[row];
      if(it){
        var cc=CC[it.category]||'#7b9ab8';
        var fm=activeF==='全部'||it.category===activeF;
        var sty=fm?'':'display:none';
        h+='<div class="lwgc"><div class="levt" style="color:'+cc+';border-left:2px solid '+cc+';'+sty+'"'+
          '>'+(it.done?'<s>'+esc(it.title)+'</s>':esc(it.title))+'</div></div>';
      }else{
        h+='<div class="lwgc"></div>';
      }
    }
  }
  grid.innerHTML=h;
  // Landscape mode removed by user request
  grid.style.transform = '';
  grid.style.transformOrigin = '';
  grid.style.width = '';
  grid.style.minWidth = '480px';
}

// ===== Init =====
function init() {
  var sel = document.getElementById('tdCat');
  var ops = '';
  CATS.forEach(function(c){ops+='<option value="'+c+'">'+c+'</option>';});
  sel.innerHTML = ops;

  var n = new Date();
  curY = n.getFullYear(); curM = n.getMonth() + 1;
  selD = getTStr();

  updWR();
  renF();
  renderCal();
  renderTD();
  renderWk();
  renH();
  renC();
  renderMemo();

  // Try load from GitHub (non-blocking, token already set or skip)
  loadFromGitHub().then(function(cd){
    if (cd && cd.version) {
      var local = getCD();
      if (cd.version > local.version) {
        localStorage.setItem('sasha_cloud', JSON.stringify(cd));
        renderCal(); renderTD(); renderWk(); renH(); renC(); renderMemo();
      } else if (local.version > cd.version && cd.version > 0) {
        doSyncNow(local);
      } else {
        showSync('ok', '已同步');
      }
    } else if (!getGitHubToken()) {
      showSync('sy', '点击同步');
    } else {
      showSync('ok', '本地');
    }
  }).catch(function(){
    showSync('er', '网络错误');
  });
}

window.addEventListener('resize', function() {
});

// Robust init: try-catch wrapped, runs on DOMContentLoaded
function safeInit() {
  try {
    init();
  } catch(e) {
    console.error('[sasha] init failed:', e);
    // Best-effort fallback render
    try { renderCal(); } catch(_){}
    try { renderTD(); } catch(_){}
    try { renH(); } catch(_){}
    try { renC(); } catch(_){}
    try { renderWk(); } catch(_){}
    try { renderMemo(); } catch(_){}
  }
}
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', safeInit);
} else {
  safeInit();
}
</script>
